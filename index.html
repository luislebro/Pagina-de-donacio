<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>El Bloke RP</title>
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    body, html {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #000;
      overflow: hidden;
      color: white;
    }
    /* Fondo animado */
    canvas#backgroundCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: #000;
    }
    /* Contenedor */
    .container {
      width: 340px;
      background: rgba(0,0,0,0.85);
      border-radius: 20px;
      padding: 30px 20px;
      text-align: center;
      margin: 50px auto;
      box-shadow: 0 0 30px #7b1eff;
    }
    /* Logo */
    .profile-pic {
      width: 240px;
      height: auto;
      margin: 0 auto 20px auto;
      display: block;
    }
    .profile-name {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 3px;
      text-shadow: 0 0 10px #7b1eff;
      margin-bottom: 25px;
      font-family: 'Courier New', Courier, monospace;
    }
    .btn {
      display: block;
      width: 100%;
      background: linear-gradient(90deg, #b300ff, #ff00aa);
      border: none;
      color: black;
      font-weight: 600;
      font-size: 18px;
      margin: 12px 0;
      padding: 15px 0;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 0 10px #ff00aa;
      transition: background 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .btn:hover {
      background: linear-gradient(90deg, #ff00aa, #b300ff);
      box-shadow: 0 0 20px #ff00aa;
    }
    footer {
      margin-top: 25px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
      letter-spacing: 1.5px;
      user-select: none;
    }
  </style>
</head>
<body>

  <canvas id="backgroundCanvas"></canvas>

  <div class="container">
    <!-- TU LOGO AQUÍ -->
    <img src="https://i.postimg.cc/3dh45Tys/EL-BLOKE-RP.png" alt="Logo El Bloke RP" class="profile-pic" />
    <div class="profile-name">EL BLOKE RP</div>

    <a href="https://www.paypal.com/donate" target="_blank" class="btn">
      Donar por PayPal
    </a>

    <a href="https://discord.com/channels/1461711614494638165/1461776895065587957" target="_blank" class="btn">
      Discord Oficial
    </a>

    <a href="https://www.youtube.com/@LuisLebron-p2z" target="_blank" class="btn">
      YouTube
    </a>

    <footer>© 2026 EL BLOKE RP</footer>
  </div>

  <script>
    const canvas = document.getElementById('backgroundCanvas');
    const ctx = canvas.getContext('2d');
    let width, height;
    let points = [];

    function setup() {
      resize();
      points = [];
      const spacing = 80;
      for(let x=0; x < width; x += spacing){
        for(let y=0; y < height; y += spacing){
          points.push({x: x + Math.random()*20, y: y + Math.random()*20, vx: (Math.random()-0.5)/2, vy: (Math.random()-0.5)/2});
        }
      }
    }

    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width;
      canvas.height = height;
    }

    function distance(p1, p2) {
      return Math.sqrt((p1.x - p2.x)**2 + (p1.y - p2.y)**2);
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, width, height);

      for(let p of points){
        p.x += p.vx;
        p.y += p.vy;
        if(p.x < 0 || p.x > width) p.vx *= -1;
        if(p.y < 0 || p.y > height) p.vy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#7b1eff';
        ctx.fill();
      }

      for(let i=0; i < points.length; i++){
        for(let j=i+1; j < points.length; j++){
          let dist = distance(points[i], points[j]);
          if(dist < 100){
            ctx.beginPath();
            ctx.strokeStyle = `rgba(123, 30, 255, ${1 - dist/100})`;
            ctx.lineWidth = 1;
            ctx.moveTo(points[i].x, points[i].y);
            ctx.lineTo(points[j].x, points[j].y);
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
      resize();
      setup();
    });

    setup();
    animate();
  </script>

</body>

</html>
